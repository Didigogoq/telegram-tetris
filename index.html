<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mech Pilot Online</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; background: #050510; color: #00f2ff; font-family: 'Courier New', monospace; overflow: hidden; }
        #ui { position: absolute; bottom: 30px; width: 100%; text-align: center; }
        .btn { 
            background: #00f2ff; color: #000; border: none; padding: 15px 25px; 
            margin: 5px; cursor: pointer; font-weight: bold; border-radius: 5px;
        }
    </style>
</head>
<body>
    <div id="ui">
        <button class="btn" onclick="performMission()">МИССИЯ (+10 лома)</button>
        <button class="btn" onclick="upgradeMech()">ПРОКАЧКА (20 лома)</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // ТВОЯ ССЫЛКА С RENDER ТУТ:
        const SERVER_URL = 'https://telegram-tetris.onrender.com';

        const config = {
            type: Phaser.AUTO,
            width: window.innerWidth,
            height: window.innerHeight - 150,
            backgroundColor: '#050510',
            scene: { preload, create, update }
        };

        let game = new Phaser.Game(config);
        let mech, statsText, scrap = 0, level = 1;

        function preload() {
            // Используем стандартный спрайт для теста
            this.load.image('mech', 'https://labs.phaser.io/assets/sprites/fleck.png');
        }

        function create() {
            mech = this.add.sprite(config.width / 2, config.height / 2, 'mech').setScale(5).setTint(0x00f2ff);
            statsText = this.add.text(20, 20, 'Загрузка данных...', { fontSize: '20px', fill: '#00f2ff' });
            
            loadProgress(); // Пытаемся загрузить данные с сервера при старте
        }

        function update() {
            if(mech) mech.y += Math.sin(this.time.now / 500) * 0.2;
        }

        function updateUI() {
            const name = tg.initDataUnsafe.user?.first_name || 'Пилот';
            statsText.setText(`ПИЛОТ: ${name}\nУРОВЕНЬ: ${level}\nМЕТАЛЛОЛОМ: ${scrap}`);
        }

        // Функция выполнения миссии
        async function performMission() {
            scrap += 10;
            updateUI();
            await saveProgress();
        }

        // Функция прокачки
        async function upgradeMech() {
            if (scrap >= 20) {
                scrap -= 20;
                level++;
                updateUI();
                await saveProgress();
            } else {
                tg.showAlert("Недостаточно лома! Нужно 20.");
            }
        }

        // СОХРАНЕНИЕ НА СЕРВЕР
        async function saveProgress() {
            const userId = tg.initDataUnsafe.user?.id || 'local_user';
            try {
                await fetch(`${SERVER_URL}/save`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId, level, scrap })
                });
            } catch (e) { console.error("Ошибка сохранения:", e); }
        }

        // ЗАГРУЗКА С СЕРВЕРА
        async function loadProgress() {
            const userId = tg.initDataUnsafe.user?.id || 'local_user';
            try {
                const res = await fetch(`${SERVER_URL}/load/${userId}`);
                const data = await res.json();
                level = data.level || 1;
                scrap = data.scrap || 0;
                updateUI();
            } catch (e) { 
                console.error("Ошибка загрузки:", e);
                updateUI(); // Если сервер спит, просто покажем дефолт
            }
        }
    </script>
</body>
</html>
