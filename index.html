<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cyber Slot 777</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --neon: #00f2ff; --pink: #ff0055; --gold: #ffcc00; }
        body { 
            margin: 0; background: #020205; color: #fff; 
            font-family: 'Segoe UI', sans-serif; overflow: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;
        }

        /* Панель баланса */
        .balance { position: absolute; top: 20px; font-size: 14px; color: var(--neon); letter-spacing: 2px; }
        #scrap-val { font-size: 24px; font-weight: 900; color: #fff; display: block; text-align: center; }

        /* Игровой автомат */
        .slot-machine {
            display: flex; gap: 10px; padding: 20px;
            background: rgba(255,255,255,0.02); border: 2px solid rgba(0,242,255,0.1);
            border-radius: 20px; backdrop-filter: blur(10px); box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }

        .reel {
            width: 80px; height: 120px; background: #050510;
            border: 1px solid rgba(0,242,255,0.2); border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 50px; overflow: hidden; position: relative;
        }

        .reel-content { display: flex; flex-direction: column; transition: transform 0.1s cubic-bezier(0.45, 0.05, 0.55, 0.95); }

        /* Кнопка */
        .spin-btn {
            margin-top: 40px; width: 200px; height: 60px;
            background: transparent; border: 2px solid var(--pink); color: var(--pink);
            font-size: 20px; font-weight: 900; border-radius: 30px; cursor: pointer;
            text-transform: uppercase; transition: 0.2s; box-shadow: 0 0 15px rgba(255,0,85,0.2);
        }
        .spin-btn:active { transform: scale(0.95); background: var(--pink); color: #000; box-shadow: 0 0 30px var(--pink); }
        .spin-btn:disabled { opacity: 0.3; filter: grayscale(1); }

        /* Инфо */
        .win-info { margin-top: 20px; height: 20px; color: var(--gold); font-weight: bold; text-transform: uppercase; font-size: 14px; }
        
        .blur { filter: blur(4px); opacity: 0.6; }
    </style>
</head>
<body>
    <div class="balance">
        CURRENT SCRAP
        <span id="scrap-val">0</span>
    </div>

    <div class="slot-machine">
        <div class="reel"><div id="reel
