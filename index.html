<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mech Battle Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; background: #020205; overflow: hidden; }
        #ui { position: absolute; top: 10px; left: 10px; color: #00f2ff; font-family: monospace; z-index: 10; font-size: 18px; text-shadow: 2px 2px #000; }
    </style>
</head>
<body>
    <div id="ui">UNIT: READY<br>SCRAP: <span id="scrap">0</span></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const SERVER_URL = 'https://telegram-tetris.onrender.com';

        const config = {
            type: Phaser.AUTO,
            width: window.innerWidth,
            height: window.innerHeight,
            physics: { default: 'arcade' },
            scene: { preload, create, update }
        };

        let player, scrap = 0;
        const game = new Phaser.Game(config);

        function preload() {
            // Загружаем ТВОЙ спрайт (убедись, что имя файла совпадает)
            this.load.spritesheet('mech', 'mech_sheet.png', { 
                frameWidth: 80, 
                frameHeight: 80 
            });
        }

        function create() {
            // Рисуем сетку для атмосферы
            let graphics = this.add.graphics();
            graphics.lineStyle(1, 0x00f2ff, 0.1);
            for(let i=0; i<config.width; i+=40) graphics.lineBetween(i, 0, i, config.height);
            for(let j=0; j<config.height; j+=40) graphics.lineBetween(0, j, config.width, j);

            // 1. Создаем анимацию ходьбы (используем первый ряд кадров 0-3)
            this.anims.create({
                key: 'walk_down',
                frames: this.anims.generateFrameNumbers('mech', { start: 0, end: 3 }),
                frameRate: 8,
                repeat: -1
            });

            // 2. Создаем робота
            player = this.physics.add.sprite(config.width/2, config.height/2, 'mech', 0);
            player.setScale(1.5); // Можно увеличить, если робот мелкий

            // 3. Управление
            this.input.on('pointerdown', (pointer) => {
                this.physics.moveToObject(player, pointer, 150);
                player.play('walk_down', true); // Запуск анимации ходьбы
            });

            loadProgress();
        }

        function update() {
            // Проверка: если робот дошел до цели - остановить анимацию
            const distance = Phaser.Math.Distance.Between(player.x, player.y, this.input.activePointer.x, this.input.activePointer.y);
            
            if (this.input.activePointer.isDown && distance < 10) {
                player.body.reset(player.x, player.y);
                player.stop(); // Остановка на кадре 0
                player.setFrame(0);
            }
        }

        async function loadProgress() {
            const userId = tg.initDataUnsafe.user?.id || 'TEST';
            try {
                const res = await fetch(`${SERVER_URL}/load/${userId}`);
                const data = await res.json();
                scrap = data.scrap || 0;
                document.getElementById('scrap').innerText = scrap;
            } catch (e) {}
        }
    </script>
</body>
</html>
