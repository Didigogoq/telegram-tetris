<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mech Arena PVP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; background: #050510; color: #00f2ff; font-family: 'Courier New', monospace; overflow: hidden; }
        #arena { display: flex; flex-direction: column; align-items: center; height: 100vh; padding: 20px; }
        .fighter-card { width: 80%; border: 2px solid #00f2ff; padding: 15px; margin: 10px; background: rgba(0,242,255,0.05); text-align: center; border-radius: 10px; box-shadow: 0 0 15px #00f2ff33; }
        .vs { font-size: 24px; font-weight: bold; color: #ff0055; margin: 10px 0; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; position: absolute; bottom: 30px; padding: 0 20px; box-sizing: border-box; }
        .btn { background: #00f2ff; color: #000; border: none; padding: 15px; font-weight: bold; border-radius: 5px; cursor: pointer; text-transform: uppercase; }
        .btn-red { background: #ff0055; color: #fff; grid-column: span 2; }
        #log { font-size: 12px; height: 60px; overflow-y: hidden; margin-top: 10px; color: #aaa; }
    </style>
</head>
<body>
    <div id="arena">
        <div class="fighter-card" id="enemy-card">
            <div style="color: #ff0055">ВРАЖЕСКИЙ МЕХ</div>
            <div id="e-hp">HP: 100</div>
            <div id="e-lvl">LVL: ?</div>
        </div>

        <div class="vs">VS</div>

        <div class="fighter-card" id="player-card">
            <div id="p-name">ТВОЙ МЕХ</div>
            <div id="p-hp">HP: 100</div>
            <div id="p-lvl">LVL: 1</div>
        </div>

        <div id="log">Ожидание приказа...</div>

        <div class="controls">
            <button class="btn" onclick="battleAction('attack')">АТАКА</button>
            <button class="btn" onclick="battleAction('defend')">ЗАЩИТА</button>
            <button class="btn btn-red" onclick="startSearch()">НАЙТИ ПРОТИВНИКА (10 Scrap)</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const SERVER_URL = 'https://telegram-tetris.onrender.com';

        let myData = { scrap: 0, level: 1, hp: 100 };
        let enemyData = { hp: 100, level: 0 };

        async function loadData() {
            const id = tg.initDataUnsafe.user?.id || 'TEST';
            const res = await fetch(`${SERVER_URL}/load/${id}`);
            const data = await res.json();
            myData.scrap = data.scrap || 0;
            myData.level = data.level || 1;
            document.getElementById('p-lvl').innerText = "LVL: " + myData.level;
            document.getElementById('p-name').innerText = tg.initDataUnsafe.user?.first_name || "PILOT";
        }

        function startSearch() {
            if (myData.scrap < 10) {
                tg.showAlert("Недостаточно Scrap для входа на Арену!");
                return;
            }
            document.getElementById('log').innerText = "Поиск цели...";
            // Имитация поиска игрока (в будущем заменим на реальный запрос к БД)
            setTimeout(() => {
                enemyData.level = Math.floor(Math.random() * 5) + 1;
                enemyData.hp = 100;
                document.getElementById('e-lvl').innerText = "LVL: " + enemyData.level;
                document.getElementById('log').innerText = "Враг обнаружен! Бой начался.";
            }, 1000);
        }

        function battleAction(type) {
            if (enemyData.level === 0) return;

            let dmg = myData.level * 10;
            let eDmg = enemyData.level * 8;

            if (type === 'defend') { eDmg /= 2; dmg /= 2; }

            enemyData.hp -= dmg;
            myData.hp -= eDmg;

            document.getElementById('e-hp').innerText = `HP: ${enemyData.hp}`;
            document.getElementById('p-hp').innerText = `HP: ${myData.hp}`;
            document.getElementById('log').innerText = `Вы нанесли ${dmg} урона. Враг ответил на ${eDmg}.`;

            if (enemyData.hp <= 0) {
                tg.showAlert("ПОБЕДА! Вы забрали 20 Scrap.");
                myData.scrap += 20;
                resetBattle();
            } else if (myData.hp <= 0) {
                tg.showAlert("МЕХ РАЗРУШЕН. Вы потеряли 10 Scrap.");
                myData.scrap -= 10;
                resetBattle();
            }
        }

        function resetBattle() {
            enemyData.level = 0;
            myData.hp = 100;
            document.getElementById('e-hp').innerText = "HP: 100";
            document.getElementById('p-hp').innerText = "HP: 100";
            saveData();
        }

        async function saveData() {
            const id = tg.initDataUnsafe.user?.id || 'TEST';
            await fetch(`${SERVER_URL}/save`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId: id, scrap: myData.scrap, level: myData.level })
            });
        }

        loadData();
    </script>
</body>
</html>
