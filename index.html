<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mech Warrior Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; background: #020205; overflow: hidden; }
        #ui { position: absolute; top: 10px; left: 10px; color: #00f2ff; font-family: monospace; z-index: 10; font-size: 18px; text-shadow: 2px 2px #000; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">SYSTEM: ACTIVE<br>SCRAP: <span id="scrap">0</span></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const SERVER_URL = 'https://telegram-tetris.onrender.com';

        const config = {
            type: Phaser.AUTO,
            width: window.innerWidth,
            height: window.innerHeight,
            physics: { default: 'arcade', arcade: { debug: false } },
            scene: { preload, create, update }
        };

        let player, scrap = 0, enemies, bullets, targetPoint = null;
        const game = new Phaser.Game(config);

        function preload() {
            // Исправленные размеры: пробуем 79x79, чтобы отсечь лишние пиксели по краям
            this.load.spritesheet('mech', 'mech_sheet.png', { 
                frameWidth: 80, 
                frameHeight: 80,
                margin: 1,   // Пропускаем 1 пиксель от края картинки
                spacing: 1   // Пропускаем 2 пикселя между кадрами
            });
            this.load.image('enemy', 'https://labs.phaser.io/assets/sprites/asmosoma.png');
            this.load.image('bullet', 'https://labs.phaser.io/assets/sprites/bullets/bullet6.png');
        }

        function create() {
            // Сетка фона
            let graphics = this.add.graphics();
            graphics.lineStyle(1, 0x00f2ff, 0.05);
            for(let i=0; i<config.width; i+=40) graphics.lineBetween(i, 0, i, config.height);
            for(let j=0; j<config.height; j+=40) graphics.lineBetween(0, j, config.width, j);

            // Анимации
            const anims = [
                { key: 'walk_down', start: 0, end: 3 },
                { key: 'walk_right', start: 4, end: 7 },
                { key: 'walk_left', start: 8, end: 11 },
                { key: 'walk_up', start: 12, end: 15 }
            ];
            anims.forEach(a => {
                this.anims.create({
                    key: a.key,
                    frames: this.anims.generateFrameNumbers('mech', { start: a.start, end: a.end }),
                    frameRate: 10,
                    repeat: -1
                });
            });

            // Группы
            enemies = this.physics.add.group();
            bullets = this.physics.add.group();

            // Игрок
            player = this.physics.add.sprite(config.width/2, config.height/2, 'mech', 0);
            player.setScale(1.5);
            player.setCollideWorldBounds(true);

            // Управление
            this.input.on('pointerdown', (pointer) => {
                targetPoint = pointer;
                this.physics.moveToObject(player, pointer, 150);
                
                const angle = Phaser.Math.Angle.Between(player.x, player.y, pointer.x, pointer.y);
                const deg = Phaser.Math.RadToDeg(angle);

                if (deg >= -45 && deg <= 45) player.play('walk_right', true);
                else if (deg > 45 && deg <= 135) player.play('walk_down', true);
                else if (deg > 135 || deg <= -135) player.play('walk_left', true);
                else if (deg < -45 && deg > -135) player.play('walk_up', true);
            });

            // Столкновение: пуля убивает врага
            this.physics.add.overlap(bullets, enemies, (bullet, enemy) => {
                bullet.destroy();
                enemy.destroy();
                scrap += 5;
                document.getElementById('scrap').innerText = scrap;
                saveProgress();
                spawnEnemy(this);
            });

            // Автострельба каждые 1.5 секунды
            this.time.addEvent({ delay: 1500, callback: fire, callbackScope: this, loop: true });

            for(let i=0; i<3; i++) spawnEnemy(this);
            loadProgress();
        }

        function spawnEnemy(scene) {
            let x = Phaser.Math.Between(50, config.width - 50);
            let y = Phaser.Math.Between(50, config.height - 50);
            let enemy = enemies.create(x, y, 'enemy').setTint(0xff0000).setScale(0.7);
        }

        function fire() {
            let target = enemies.getFirstAlive();
            if (target) {
                let bullet = bullets.create(player.x, player.y, 'bullet').setTint(0x00f2ff);
                this.physics.moveToObject(bullet, target, 400);
            }
        }

        function update() {
            if (targetPoint) {
                const distance = Phaser.Math.Distance.Between(player.x, player.y, targetPoint.x, targetPoint.y);
                if (distance < 10) {
                    player.body.reset(player.x, player.y);
                    player.anims.stop();
                    targetPoint = null;
                }
            }
        }

        async function saveProgress() {
            const userId = tg.initDataUnsafe.user?.id || 'TEST';
            fetch(`${SERVER_URL}/save`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId, level: 1, scrap })
            });
        }

        async function loadProgress() {
            const userId = tg.initDataUnsafe.user?.id || 'TEST';
            try {
                const res = await fetch(`${SERVER_URL}/load/${userId}`);
                const data = await res.json();
                scrap = data.scrap || 0;
                document.getElementById('scrap').innerText = scrap;
            } catch (e) {}
        }
    </script>
</body>
</html>
