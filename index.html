<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cyber Slot 777</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --neon: #00f2ff; --pink: #ff0055; --gold: #ffcc00; --bg: #020205; }
        
        body { 
            margin: 0; background: var(--bg); color: #fff; 
            font-family: 'Courier New', monospace; overflow: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;
        }

        /* Баланс сверху */
        .header { position: absolute; top: 40px; text-align: center; }
        .label { font-size: 10px; color: var(--neon); letter-spacing: 4px; opacity: 0.7; }
        #balance { font-size: 36px; font-weight: 900; text-shadow: 0 0 15px var(--neon); margin-top: 5px; }

        /* Игровой блок */
        .slot-wrapper {
            display: flex; gap: 15px; padding: 30px;
            background: rgba(255,255,255,0.02); border: 1px solid rgba(0,242,255,0.1);
            border-radius: 25px; box-shadow: 0 0 60px rgba(0,0,0,1);
            position: relative;
        }

        .reel {
            width: 75px; height: 110px; background: #000;
            border: 2px solid #111; border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            font-size: 50px; font-weight: 900; transition: 0.1s;
            box-shadow: inset 0 0 20px rgba(0,0,0,1);
        }

        /* Стили символов */
        .s-7 { color: var(--gold); text-shadow: 0 0 20px var(--gold); }
        .s-X { color: var(--pink); text-shadow: 0 0 20px var(--pink); }
        .s-A { color: var(--neon); text-shadow: 0 0 20px var(--neon); }
        .s-S { color: #fff; text-shadow: 0 0 20px #fff; }

        /* Кнопка управления */
        .spin-container { margin-top: 50px; }
        .btn-spin {
            width: 240px; height: 70px; background: transparent;
            border: 2px solid var(--pink); color: var(--pink);
            font-size: 24px; font-weight: 900; border-radius: 15px;
            cursor: pointer; transition: 0.2s; letter-spacing: 2px;
            box-shadow: 0 0 20px rgba(255,0,85,0.1);
        }
        .btn-spin:active { transform: scale(0.92); background: var(--pink); color: #000; box-shadow: 0 0 40px var(--pink); }
        .btn-spin:disabled { opacity: 0.1; filter: grayscale(1); }

        /* Сообщения */
        #status { margin-top: 25px; height: 30px; font-size: 20px; font-weight: bold; color: var(--gold); text-align: center; }
        
        /* Эффект вращения */
        .blur { filter: blur(6px); opacity: 0.3; transform: scale(0.9); }
    </style>
</head>
<body>

    <div class="header">
        <div class="label">CREDITS AVAILABLE</div>
        <div id="balance">0</div>
    </div>

    <div class="slot-wrapper">
        <div class="reel" id="r1">7</div>
        <div class="reel" id="r2">7</div>
        <div class="reel" id="r3">7</div>
    </div>

    <div id="status"></div>

    <div class="spin-container">
        <button id="spin-btn" class="btn-spin" onclick="startSpin()">SPIN (-10)</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        const SERVER_URL = 'https://telegram-tetris.onrender.com';
        const symbols = ['7', 'X', 'A', 'S']; 
        let credits = 0;
        let isSpinning = false;

        async function loadGame() {
            const userId = tg.initDataUnsafe.user?.id || 'LOCAL_DEV';
            try {
                const res = await fetch(`${SERVER_URL}/load/${userId}`);
                const data = await res.json();
                credits = data.scrap || 100; // Если 0 или новый игрок - даем 100
                if (credits < 10) credits = 100;
                updateView();
            } catch(e) { 
                credits = 100; 
                updateView(); 
            }
        }

        function updateView() {
            document.getElementById('balance').innerText = credits;
            // Обновляем цвета символов в барабанах
            [1,2,3].forEach(id => {
                const el = document.getElementById('r'+id);
                el.className = 'reel s-' + el.innerText;
            });
        }

        function startSpin() {
            if (isSpinning || credits < 10) return;

            isSpinning = true;
            credits -= 10;
            updateView();
            document.getElementById('status').innerText = "";
            document.getElementById('spin-btn').disabled = true;

            const reels = [document.getElementById('r1'), document.getElementById('r2'), document.getElementById('r3')];
            let results = [];

            reels.forEach((reel, index) => {
                reel.classList.add('blur');
                let iters = 0;
                let maxIters = 12 + (index * 8); // Разное время остановки

                let timer = setInterval(() => {
                    const randomSym = symbols[Math.floor(Math.random() * symbols.length)];
                    reel.innerText = randomSym;
                    reel.className = 'reel s-' + randomSym + ' blur'; // Держим цвет даже в блюре
                    
                    iters++;
                    if (iters > maxIters) {
                        clearInterval(timer);
                        const finalSym = symbols[Math.floor(Math.random() * symbols.length)];
                        reel.innerText = finalSym;
                        results[index] = finalSym;
                        reel.classList.remove('blur');
                        updateView();
                        tg.HapticFeedback.impactOccurred('medium');

                        if (index === 2) finalize(results);
                    }
                }, 70);
            });
        }

        function finalize(res) {
            isSpinning = false;
            document.getElementById('spin-btn').disabled = false;
            
            let prize = 0;
            // ЛОГИКА ВЫИГРЫША
            if (res[0] === res[1] && res[1] === res[2]) {
                if (res[0] === '7') prize = 500;
                else if (res[0] === 'X') prize = 200;
                else if (res[1] === 'A') prize = 150;
                else prize = 100;
            } else if (res[0] === res[1] || res[1] === res[2] || res[0] === res[2]) {
                prize = 25;
            }

            if (prize > 0) {
                credits += prize;
                document.getElementById('status').innerText = "WIN: +" + prize;
                tg.HapticFeedback.notificationOccurred('success');
            }
            
            updateView();
            saveGame();
        }

        async function saveGame() {
            const userId = tg.initDataUnsafe.user?.id || 'LOCAL_DEV';
            fetch(`${SERVER_URL}/save`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId: userId, scrap: credits, level: 1 })
            });
        }

        loadGame();
    </script>
</body>
</html>
