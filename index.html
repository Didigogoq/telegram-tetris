<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cyber Mech Arena</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --neon-blue: #00f2ff; --neon-pink: #ff0055; --bg-dark: #020205; }
        
        body { 
            margin: 0; background: var(--bg-dark); color: #fff; 
            font-family: 'Segoe UI', Roboto, sans-serif; overflow: hidden;
            background-image: radial-gradient(circle at 50% 50%, #101025 0%, #020205 100%);
        }

        #arena { 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: space-around; height: 100vh; padding: 20px; box-sizing: border-box; 
        }

        /* Карточки бойцов */
        .card {
            width: 100%; max-width: 320px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(0, 242, 255, 0.2);
            border-radius: 15px; padding: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: all 0.5s ease;
        }

        .enemy-card { border-color: var(--neon-pink); box-shadow: 0 0 15px rgba(255,0,85,0.2); }
        .player-card { border-color: var(--neon-blue); box-shadow: 0 0 15px rgba(0,242,255,0.2); }

        .name { font-size: 12px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; color: #aaa; }
        .hp-bar-bg { width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; margin: 10px 0; }
        .hp-bar-fill { height: 100%; width: 100%; transition: width 0.3s ease; }
        .enemy-card .hp-bar-fill { background: var(--neon-pink); box-shadow: 0 0 10px var(--neon-pink); }
        .player-card .hp-bar-fill { background: var(--neon-blue); box-shadow: 0 0 10px var(--neon-blue); }

        /* Центр (VS) */
        .vs-zone { font-size: 40px; font-weight: 900; font-style: italic; color: rgba(255,255,255,0.1); position: relative; }
        .vs-zone::after { content: 'BATTLE'; position: absolute; font-size: 10px; bottom: -10px; left: 50%; transform: translateX(-50%); letter-spacing: 5px; color: var(--neon-pink); }

        /* Кнопки */
        .controls { width: 100%; max-width: 320px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        .btn {
            background: transparent; border: 1px solid var(--neon-blue); color: var(--neon-blue);
            padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer;
            transition: all 0.2s; text-transform: uppercase; font-size: 12px;
        }

        .btn:active { background: var(--neon-blue); color: #000; box-shadow: 0 0 20px var(--neon-blue); }
        
        .btn-search {
            grid-column: span 2; border-color: var(--neon-pink); color: var(--neon-pink);
            background: rgba(255,0,85,0.05); margin-top: 10px;
        }

        #log { font-size: 11px; color: #666; height: 30px; text-align: center; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div id="arena">
        <div class="card enemy-card" id="e-card" style="opacity: 0.5;">
            <div class="name">Opponent System</div>
            <div id="e-hp-text" style="font-size: 20px; font-weight: bold;">HP: 100</div>
            <div class="hp-bar-bg"><div id="e-hp-fill" class="hp-bar-fill"></div></div>
            <div id="e-lvl" style="color: var(--neon-pink); font-size: 11px;">LVL: ?</div>
        </div>

        <div class="vs-zone">VS</div>

        <div class="card player-card">
            <div class="name" id="p-name">Loading...</div>
            <div id="p-hp-text" style="font-size: 20px; font-weight: bold;">HP: 100</div>
            <div class="hp-bar-bg"><div id="p-hp-fill" class="hp-bar-fill"></div></div>
            <div style="display: flex; justify-content: space-between; font-size: 11px;">
                <span id="p-lvl" style="color: var(--neon-blue);">LVL: 1</span>
                <span id="p-scrap" style="color: #ffcc00;">SCRAP: 0</span>
            </div>
        </div>

        <div id="log">SYSTEM READY...</div>

        <div class="controls">
            <button class="btn" onclick="battleAction('attack')">Strike</button>
            <button class="btn" onclick="battleAction('defend')">Shield</button>
            <button class="btn btn-search" onclick="startSearch()">Search Enemy (-10 Scrap)</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const SERVER_URL = 'https://telegram-tetris.onrender.com';

        let pStats = { scrap: 0, level: 1, hp: 100 };
        let eStats = { hp: 100, level: 0 };

        async function init() {
            const id = tg.initDataUnsafe.user?.id || 'TEST';
            try {
                const res = await fetch(`${SERVER_URL}/load/${id}`);
                const data = await res.json();
                pStats.scrap = data.scrap || 0;
                pStats.level = data.level || 1;
                updateUI();
            } catch(e) { updateUI(); }
        }

        function updateUI() {
            document.getElementById('p-name').innerText = tg.initDataUnsafe.user?.first_name || "PILOT";
            document.getElementById('p-scrap').innerText = "SCRAP: " + pStats.scrap;
            document.getElementById('p-lvl').innerText = "LVL: " + pStats.level;
            document.getElementById('p-hp-text').innerText = "HP: " + Math.max(0, pStats.hp);
            document.getElementById('p-hp-fill').style.width = pStats.hp + "%";
            
            document.getElementById('e-hp-text').innerText = "HP: " + Math.max(0, eStats.hp);
            document.getElementById('e-hp-fill').style.width = eStats.hp + "%";
        }

        function startSearch() {
            if (pStats.scrap < 10) return tg.showAlert("Low Scrap!");
            pStats.scrap -= 10;
            document.getElementById('log').innerText = "SCANNING SECTOR...";
            document.getElementById('e-card').style.opacity = "0.3";
            
            setTimeout(() => {
                eStats.level = Math.floor(Math.random() * pStats.level) + 1;
                eStats.hp = 100;
                document.getElementById('e-lvl').innerText = "LVL: " + eStats.level;
                document.getElementById('e-card').style.opacity = "1";
                document.getElementById('log').innerText = "TARGET LOCKED!";
                updateUI();
            }, 800);
        }

        function battleAction(type) {
            if (eStats.level === 0 || eStats.hp <= 0 || pStats.hp <= 0) return;

            let pDmg = (Math.random() * 15 + 10) * (pStats.level * 0.5);
            let eDmg = (Math.random() * 12 + 8) * (eStats.level * 0.5);

            if (type === 'defend') { eDmg *= 0.3; pDmg *= 0.5; }

            eStats.hp -= Math.floor(pDmg);
            pStats.hp -= Math.floor(eDmg);
            updateUI();

            if (eStats.hp <= 0) {
                tg.showConfirm("VICTORY! +30 Scrap");
                pStats.scrap += 30;
                endBattle();
            } else if (pStats.hp <= 0) {
                tg.showConfirm("SYSTEM FAILURE! -10 Scrap");
                pStats.scrap = Math.max(0, pStats.scrap - 10);
                endBattle();
            }
        }

        function endBattle() {
            eStats.level = 0;
            pStats.hp = 100;
            save();
            setTimeout(updateUI, 500);
        }

        async function save() {
            const id = tg.initDataUnsafe.user?.id || 'TEST';
            await fetch(`${SERVER_URL}/save`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId: id, scrap: pStats.scrap, level: pStats.level })
            });
        }

        init();
    </script>
</body>
</html>
