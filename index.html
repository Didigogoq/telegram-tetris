<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mech Pilot Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; background: #020205; overflow: hidden; }
        #ui { position: absolute; top: 10px; left: 10px; color: #00f2ff; font-family: monospace; z-index: 10; font-size: 18px; text-shadow: 2px 2px #000; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">SYSTEM: ACTIVE<br>SCRAP: <span id="scrap">0</span></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const SERVER_URL = 'https://telegram-tetris.onrender.com';

        const config = {
            type: Phaser.AUTO,
            width: window.innerWidth,
            height: window.innerHeight,
            physics: { default: 'arcade' },
            scene: { preload, create, update }
        };

        let player, scrap = 0;
        let targetPoint = null;
        const game = new Phaser.Game(config);

        function preload() {
            // Загружаем спрайт. Если 80х80 не подходит, попробуй поменять на 78 или 82, если увидишь полосы
            this.load.spritesheet('mech', 'mech_sheet.png', { 
                frameWidth: 80, 
                frameHeight: 80 
            });
        }

        function create() {
            // Фоновая сетка
            let graphics = this.add.graphics();
            graphics.lineStyle(1, 0x00f2ff, 0.05);
            for(let i=0; i<config.width; i+=40) graphics.lineBetween(i, 0, i, config.height);
            for(let j=0; j<config.height; j+=40) graphics.lineBetween(0, j, config.width, j);

            // 1. Создаем анимации для всех направлений
            // Вниз (Ряд 1)
            this.anims.create({
                key: 'walk_down',
                frames: this.anims.generateFrameNumbers('mech', { start: 0, end: 3 }),
                frameRate: 10,
                repeat: -1
            });
            // Вверх (Ряд 4)
            this.anims.create({
                key: 'walk_up',
                frames: this.anims.generateFrameNumbers('mech', { start: 12, end: 15 }),
                frameRate: 10,
                repeat: -1
            });
            // Вправо (Ряд 2)
            this.anims.create({
                key: 'walk_right',
                frames: this.anims.generateFrameNumbers('mech', { start: 4, end: 7 }),
                frameRate: 10,
                repeat: -1
            });
            // Влево (Ряд 3)
            this.anims.create({
                key: 'walk_left',
                frames: this.anims.generateFrameNumbers('mech', { start: 8, end: 11 }),
                frameRate: 10,
                repeat: -1
            });

            // 2. Создаем робота
            player = this.physics.add.sprite(config.width/2, config.height/2, 'mech', 0);
            player.setScale(1.5);

            // 3. Управление
            this.input.on('pointerdown', (pointer) => {
                targetPoint = pointer;
                this.physics.moveToObject(player, pointer, 150);
                
                // Определяем направление для анимации
                const angle = Phaser.Math.Angle.Between(player.x, player.y, pointer.x, pointer.y);
                const deg = Phaser.Math.RadToDeg(angle);

                if (deg >= -45 && deg <= 45) player.play('walk_right', true);
                else if (deg > 45 && deg <= 135) player.play('walk_down', true);
                else if (deg > 135 || deg <= -135) player.play('walk_left', true);
                else if (deg < -45 && deg > -135) player.play('walk_up', true);
            });

            loadProgress();
        }

        function update() {
            if (targetPoint) {
                const distance = Phaser.Math.Distance.Between(player.x, player.y, targetPoint.x, targetPoint.y);
                
                // Если дошли до цели
                if (distance < 10) {
                    player.body.reset(player.x, player.y);
                    player.anims.stop();
                    targetPoint = null;
                }
            }
        }

        async function loadProgress() {
            const userId = tg.initDataUnsafe.user?.id || 'TEST';
            try {
                const res = await fetch(`${SERVER_URL}/load/${userId}`);
                const data = await res.json();
                scrap = data.scrap || 0;
                document.getElementById('scrap').innerText = scrap;
            } catch (e) {}
        }
    </script>
</body>
</html>
